[project]
name = "recipes-api"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "boto3>=1.43.14",
    "boto3-stubs~=1.43.14",
    "cachetools>=7.1.4",
    "fastapi-cognito>=2.9.0",
    "fastapi[standard]>=0.136.3",
    "python-ulid>=3.1.0",
]
[dependency-groups]
dev = [
    "ruff>=0.15.14",
    "pytest>=9.0.3",
]

[project.scripts]
dynamodb_local = "dev.dynamodb_local:main"

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
module-name = "app"

[tool.setuptools]
packages = ["schemas", "services"]
